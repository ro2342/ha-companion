name: 01 - Gerar certificado de assinatura (rodar uma vez)

# Esse workflow NÃO roda sozinho a cada push — só quando você aciona
# manualmente pela aba "Actions" do GitHub (botão "Run workflow"). É um
# passo único de configuração: gera um certificado autoassinado, salva a
# chave privada (.pfx) de volta no repositório (usada por todo build futuro)
# e disponibiliza a chave pública (.cer) como artefato pra você instalar uma
# vez no Lumia. Mesmo esquema do theartistsway/.github/workflows/01-generate-cert.yml.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cert:
    runs-on: windows-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar certificado autoassinado
        shell: pwsh
        run: |
          $pfxPath = "uwp/HaCompanionUWP/HaCompanionUWP_TemporaryKey.pfx"
          $cerPath = "hacompanion-public-cert.cer"
          $password = "HaCompanion2026!"

          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=RodCarvalho-HaCompanion-SelfSigned" `
            -KeyUsage DigitalSignature `
            -FriendlyName "HA Companion - certificado de sideload" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}Subject Type:End Entity")

          $securePassword = ConvertTo-SecureString -String $password -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $securePassword | Out-Null
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          Write-Host "Certificado gerado com sucesso."

      - name: Publicar o certificado público (.cer) como artefato
        uses: actions/upload-artifact@v4
        with:
          name: hacompanion-public-cert
          path: hacompanion-public-cert.cer

      - name: Salvar a chave privada (.pfx) de volta no repositório
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uwp/HaCompanionUWP/HaCompanionUWP_TemporaryKey.pfx
          git commit -m "chore: gerar certificado de assinatura para sideload (automático)" || echo "nada para commitar"
          git push
